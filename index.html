<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Padel Turnier – 21. März 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body {
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0a0f1a; color: #e2e8f0;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
  }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type="number"] { -moz-appearance: textfield; appearance: textfield; }
  input:focus, button:focus { outline: none; }
  button { -webkit-tap-highlight-color: transparent; }

  @keyframes flipIn {
    0% { transform: rotateY(90deg) scale(0.8); opacity: 0; }
    60% { transform: rotateY(-10deg) scale(1.05); opacity: 1; }
    100% { transform: rotateY(0deg) scale(1); opacity: 1; }
  }
  @keyframes shuffle {
    0%, 100% { transform: translateY(0); }
    25% { transform: translateY(-6px) rotate(-2deg); }
    75% { transform: translateY(6px) rotate(2deg); }
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<script>
const { useState, useCallback, useEffect, createElement: h } = React;

var COURTS = 3, ROUNDS = 5;

var SCHEDULE = [
  { time: "18:00\u201318:10", label: "Ankommen & Begr\u00fc\u00dfung", type: "break" },
  { time: "18:10\u201318:20", label: "Aufw\u00e4rmen", type: "warmup" },
  { time: "18:20\u201318:32", label: "Runde 1", type: "round", round: 0 },
  { time: "18:32\u201318:37", label: "Pause & Umlosung", type: "break" },
  { time: "18:37\u201318:49", label: "Runde 2", type: "round", round: 1 },
  { time: "18:49\u201318:54", label: "Pause & Umlosung", type: "break" },
  { time: "18:54\u201319:06", label: "Runde 3", type: "round", round: 2 },
  { time: "19:06\u201319:11", label: "Pause & Umlosung", type: "break" },
  { time: "19:11\u201319:23", label: "Runde 4", type: "round", round: 3 },
  { time: "19:23\u201319:28", label: "Pause & Umlosung", type: "break" },
  { time: "19:28\u201319:40", label: "Runde 5", type: "round", round: 4 },
  { time: "19:40\u201319:50", label: "Halbfinale vorbereiten", type: "break" },
  { time: "19:50\u201320:00", label: "Finale", type: "finale" },
];

var DEFAULT_NAMES = [
  "Spieler 1","Spieler 2","Spieler 3","Spieler 4",
  "Spieler 5","Spieler 6","Spieler 7","Spieler 8",
  "Spieler 9","Spieler 10","Spieler 11","Spieler 12",
];

var C = {
  bg:"#0a0f1a", card:"#111827", cardLight:"#1a2236",
  accent:"#22d3ee", accentDim:"rgba(34,211,238,0.15)",
  gold:"#fbbf24", silver:"#94a3b8", bronze:"#d97706",
  green:"#34d399", red:"#f87171",
  text:"#e2e8f0", textDim:"#64748b", white:"#ffffff", border:"#1e293b",
};

function useIsWide() {
  var s = useState(window.innerWidth >= 768);
  useEffect(function() {
    var fn = function() { s[1](window.innerWidth >= 768); };
    window.addEventListener("resize", fn);
    return function() { window.removeEventListener("resize", fn); };
  }, []);
  return s[0];
}

function generatePairings(players) {
  var n = players.length, allRounds = [], history = {};
  players.forEach(function(_, i) { history[i] = new Set(); });
  for (var r = 0; r < ROUNDS; r++) {
    var best = null, bestScore = Infinity;
    for (var a = 0; a < 300; a++) {
      var sh = [], i; for (i = 0; i < n; i++) sh.push(i);
      sh.sort(function() { return Math.random() - 0.5; });
      var matches = [];
      for (var m = 0; m < COURTS; m++) {
        matches.push({
          court: m+1,
          teamA: [sh[m*4], sh[m*4+1]],
          teamB: [sh[m*4+2], sh[m*4+3]],
          scoreA: 0, scoreB: 0, submitted: false,
        });
      }
      var sc = 0;
      matches.forEach(function(mt) {
        if (history[mt.teamA[0]].has(mt.teamA[1])) sc += 10;
        if (history[mt.teamB[0]].has(mt.teamB[1])) sc += 10;
      });
      if (sc < bestScore) { bestScore = sc; best = matches; }
      if (sc === 0) break;
    }
    best.forEach(function(mt) {
      history[mt.teamA[0]].add(mt.teamA[1]);
      history[mt.teamA[1]].add(mt.teamA[0]);
      history[mt.teamB[0]].add(mt.teamB[1]);
      history[mt.teamB[1]].add(mt.teamB[0]);
    });
    allRounds.push(best);
  }
  return allRounds;
}

function validateScore(a, b) {
  if (a === 0 && b === 0) return { valid: true, error: "" };
  if (a < 12 && b < 12) return { valid: true, error: "" };
  if (a === 12 && b <= 11) return { valid: true, error: "" };
  if (b === 12 && a <= 11) return { valid: true, error: "" };
  if (a >= 11 && b >= 11) {
    var d = Math.abs(a - b);
    if (d === 2) return { valid: true, error: "" };
    if (d === 0) return { valid: true, error: "Gleichstand \u2013 weiterspielen bis 2 Pkt. Unterschied" };
    if (d === 1) return { valid: true, error: "Nur 1 Punkt Unterschied \u2013 2 Pkt. Differenz n\u00f6tig" };
    return { valid: false, error: "Ung\u00fcltig: Ab 11:11 mit exakt 2 Pkt. Unterschied gewinnen" };
  }
  if (a > 12 || b > 12) return { valid: false, error: "Max. 12 Punkte (au\u00dfer ab 11:11)" };
  return { valid: true, error: "" };
}

function isDecided(a, b) {
  if (a === 0 && b === 0) return false;
  if (a === 12 && b <= 11) return true;
  if (b === 12 && a <= 11) return true;
  return (a >= 11 && b >= 11 && Math.abs(a - b) === 2);
}

function getRanking(names, rounds) {
  var pts = names.map(function(_, i) {
    var tp = 0, w = 0, p = 0;
    rounds.forEach(function(rd) { rd.forEach(function(m) {
      if (!m.submitted) return;
      var inA = m.teamA.indexOf(i) >= 0, inB = m.teamB.indexOf(i) >= 0;
      if (!inA && !inB) return;
      p++;
      if (inA) { tp += m.scoreA; if (m.scoreA > m.scoreB) w++; }
      else { tp += m.scoreB; if (m.scoreB > m.scoreA) w++; }
    }); });
    return { index: i, name: names[i], tp: tp, w: w, p: p };
  });
  pts.sort(function(a, b) { return b.w - a.w || b.tp - a.tp; });
  return pts;
}

// ── Lottery ──
function LotteryScreen(props) {
  var names = props.names, onComplete = props.onComplete;
  var ps = useState("ready"), phase = ps[0], setPhase = ps[1];
  var as = useState([]), assignments = as[0], setAssignments = as[1];
  var rs = useState(0), revealedCount = rs[0], setRevealedCount = rs[1];
  var wide = useIsWide();

  function startLottery() {
    var numbers = [], i; for (i = 1; i <= names.length; i++) numbers.push(i);
    numbers.sort(function() { return Math.random() - 0.5; });
    var result = names.map(function(name, i) { return { name: name, number: numbers[i] }; });
    setAssignments(result);
    setPhase("shuffling");
    setTimeout(function() {
      setPhase("revealing");
      var count = 0;
      var iv = setInterval(function() {
        count++;
        setRevealedCount(count);
        if (count >= names.length) { clearInterval(iv); setTimeout(function() { setPhase("done"); }, 600); }
      }, 350);
    }, 2000);
  }

  var items = phase === "ready" ? names.map(function(name) { return { name: name, number: "?" }; }) : assignments;

  return h("div", { style: { padding: wide ? "32px 48px" : "16px", maxWidth: 900, margin: "0 auto" } },
    h("div", { style: {
      textAlign: "center", marginBottom: 28,
      background: "linear-gradient(135deg, " + C.accentDim + ", transparent)",
      borderRadius: 16, padding: wide ? "36px 24px" : "28px 16px",
      border: "1px solid " + C.border,
    }},
      h("div", { style: { fontSize: 13, letterSpacing: 4, color: C.accent, marginBottom: 6, fontWeight: 600 } }, "PADEL TURNIER"),
      h("div", { style: { fontSize: wide ? 32 : 26, fontWeight: 800, color: C.white } }, "21. M\u00e4rz 2026"),
      h("div", { style: { fontSize: 13, color: C.textDim, marginTop: 6 } }, "18:00 \u2013 20:00 Uhr \u00b7 3 Pl\u00e4tze \u00b7 12 Spieler"),
    ),
    h("div", { style: { textAlign: "center", marginBottom: 20, fontSize: wide ? 20 : 16, fontWeight: 700, color: C.white } },
      phase === "ready" ? "\uD83C\uDFB2 Startnummern auslosen" :
      phase === "shuffling" ? "\uD83C\uDFB0 Lose werden gemischt..." :
      phase === "revealing" ? "\uD83C\uDCCF Nummern werden aufgedeckt..." :
      "\u2705 Alle Nummern zugewiesen!"
    ),
    h("div", { style: { display: "grid", gridTemplateColumns: wide ? "repeat(4, 1fr)" : "repeat(2, 1fr)", gap: wide ? 12 : 8, marginBottom: 24 } },
      items.map(function(item, i) {
        var revealed = phase === "done" || (phase === "revealing" && i < revealedCount);
        return h("div", { key: i, style: {
          display: "flex", alignItems: "center", gap: 12,
          padding: wide ? "14px 16px" : "10px 12px",
          background: revealed ? C.cardLight : C.card,
          border: "1px solid " + (revealed ? C.accent : C.border),
          borderRadius: 10,
          animation: phase === "shuffling" ? "shuffle 0.3s ease-in-out infinite" : revealed ? "flipIn 0.5s ease-out forwards" : "none",
          animationDelay: phase === "shuffling" ? (i * 30) + "ms" : "0ms",
          opacity: phase === "revealing" && !revealed ? 0.4 : 1,
          transition: "opacity 0.3s, border 0.3s",
        }},
          h("div", { style: {
            width: wide ? 40 : 32, height: wide ? 40 : 32, borderRadius: "50%",
            background: revealed ? "linear-gradient(135deg, " + C.accent + ", #06b6d4)" : C.border,
            display: "flex", alignItems: "center", justifyContent: "center",
            fontSize: wide ? 18 : 15, fontWeight: 800,
            color: revealed ? C.bg : C.textDim, flexShrink: 0,
          }}, revealed ? item.number : "?"),
          h("div", { style: { fontSize: wide ? 15 : 13, fontWeight: 600, color: revealed ? C.white : C.text } }, item.name),
        );
      })
    ),
    phase === "ready" ? h("button", {
      onClick: startLottery,
      style: {
        width: "100%", maxWidth: 400, margin: "0 auto", display: "block",
        padding: 14, background: "linear-gradient(135deg, " + C.accent + ", #06b6d4)",
        border: "none", borderRadius: 10, color: C.bg,
        fontSize: 15, fontWeight: 800, cursor: "pointer", letterSpacing: 1,
        fontFamily: "'DM Sans', sans-serif",
      },
    }, "\uD83C\uDFB2 NUMMERN AUSLOSEN") : null,
    phase === "done" ? h("button", {
      onClick: function() { onComplete(assignments); },
      style: {
        width: "100%", maxWidth: 400, margin: "0 auto", display: "block",
        padding: 14, background: "linear-gradient(135deg, " + C.green + ", #10b981)",
        border: "none", borderRadius: 10, color: C.bg,
        fontSize: 15, fontWeight: 800, cursor: "pointer", letterSpacing: 1,
        fontFamily: "'DM Sans', sans-serif", animation: "pulse 1.5s ease-in-out infinite",
      },
    }, "WEITER ZUM TURNIER \u25B6") : null,
  );
}

// ── Player Setup ──
function PlayerSetup(props) {
  var names = props.names, setNames = props.setNames, onNext = props.onNext;
  var wide = useIsWide();
  return h("div", { style: { padding: wide ? "32px 48px" : "16px", maxWidth: 900, margin: "0 auto" } },
    h("div", { style: {
      textAlign: "center", marginBottom: 28,
      background: "linear-gradient(135deg, " + C.accentDim + ", transparent)",
      borderRadius: 16, padding: wide ? "36px 24px" : "28px 16px",
      border: "1px solid " + C.border,
    }},
      h("div", { style: { fontSize: 13, letterSpacing: 4, color: C.accent, marginBottom: 6, fontWeight: 600 } }, "PADEL TURNIER"),
      h("div", { style: { fontSize: wide ? 32 : 26, fontWeight: 800, color: C.white } }, "21. M\u00e4rz 2026"),
      h("div", { style: { fontSize: 13, color: C.textDim, marginTop: 6 } }, "18:00 \u2013 20:00 Uhr \u00b7 3 Pl\u00e4tze \u00b7 12 Spieler"),
    ),
    h("div", { style: { fontSize: wide ? 16 : 14, fontWeight: 700, color: C.text, marginBottom: 12 } }, "Spielernamen eintragen:"),
    h("div", { style: { display: "grid", gridTemplateColumns: wide ? "repeat(3, 1fr)" : "repeat(2, 1fr)", gap: wide ? 12 : 8 } },
      names.map(function(name, i) {
        return h("div", { key: i, style: { position: "relative" } },
          h("span", { style: {
            position: "absolute", left: 10, top: "50%", transform: "translateY(-50%)",
            fontSize: 11, color: C.accent, fontWeight: 700, width: 20, textAlign: "center",
          } }, i + 1),
          h("input", {
            value: name,
            onChange: function(e) { var n = names.slice(); n[i] = e.target.value; setNames(n); },
            placeholder: "Spieler " + (i + 1),
            style: {
              width: "100%", boxSizing: "border-box",
              padding: wide ? "12px 12px 12px 36px" : "10px 10px 10px 34px",
              background: C.cardLight, border: "1px solid " + C.border,
              borderRadius: 8, color: C.white, fontSize: wide ? 15 : 14,
              fontFamily: "'DM Sans', sans-serif",
            },
            onFocus: function(e) { e.target.style.borderColor = C.accent; },
            onBlur: function(e) { e.target.style.borderColor = C.border; },
          }),
        );
      })
    ),
    h("button", {
      onClick: onNext,
      style: {
        width: "100%", maxWidth: 400, margin: "20px auto 0", display: "block",
        padding: 14, background: "linear-gradient(135deg, " + C.accent + ", #06b6d4)",
        border: "none", borderRadius: 10, color: C.bg,
        fontSize: 15, fontWeight: 800, cursor: "pointer", letterSpacing: 1,
        fontFamily: "'DM Sans', sans-serif",
      },
    }, "WEITER ZUR AUSLOSUNG \u25B6"),
  );
}

// ── ScoreInput ──
function ScoreInput(props) {
  var match = props.match, names = props.names, onScore = props.onScore, wide = props.wide;
  var tA = match.teamA.map(function(i) { return names[i]; }).join(" & ");
  var tB = match.teamB.map(function(i) { return names[i]; }).join(" & ");
  var v = validateScore(match.scoreA, match.scoreB);
  var decided = isDecided(match.scoreA, match.scoreB);
  function getMax(t, o) { return (o >= 11 && t >= 11) ? o + 2 : 12; }
  function iStyle(win) {
    return {
      width: wide ? 64 : 56, textAlign: "center", padding: wide ? "10px 4px" : "8px 4px",
      background: C.card, border: "1px solid " + (win ? C.green : !v.valid ? C.red : C.border),
      borderRadius: 8, color: win ? C.green : C.white,
      fontSize: wide ? 26 : 22, fontWeight: 800, fontFamily: "'DM Sans', sans-serif",
    };
  }
  var bc = match.submitted ? C.green : !v.valid ? C.red : decided ? C.green + "60" : C.border;
  return h("div", { style: {
    background: C.cardLight, borderRadius: 12, padding: wide ? 16 : 14,
    border: "1px solid " + bc,
  }},
    h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 } },
      h("div", { style: { fontSize: wide ? 13 : 11, color: C.accent, fontWeight: 700, letterSpacing: 2 } }, "PLATZ " + match.court),
      decided && !match.submitted ? h("div", { style: { fontSize: wide ? 12 : 10, color: C.green, fontWeight: 600 } }, "\u2713 Entschieden") : null,
    ),
    h("div", { style: { display: "flex", alignItems: "center", gap: wide ? 12 : 8 } },
      h("div", { style: { flex: 1, textAlign: "center" } },
        h("div", { style: { fontSize: wide ? 14 : 13, color: C.text, fontWeight: 600, marginBottom: 8, lineHeight: 1.3, minHeight: wide ? 42 : 36 } }, tA),
        h("input", {
          type: "number", min: 0, max: getMax(match.scoreA, match.scoreB),
          value: match.scoreA || "",
          onChange: function(e) { onScore("A", Math.max(0, parseInt(e.target.value) || 0)); },
          disabled: match.submitted, style: iStyle(decided && match.scoreA > match.scoreB),
        }),
      ),
      h("div", { style: { fontSize: wide ? 20 : 18, color: C.textDim, fontWeight: 700, padding: "0 4px" } }, "vs"),
      h("div", { style: { flex: 1, textAlign: "center" } },
        h("div", { style: { fontSize: wide ? 14 : 13, color: C.text, fontWeight: 600, marginBottom: 8, lineHeight: 1.3, minHeight: wide ? 42 : 36 } }, tB),
        h("input", {
          type: "number", min: 0, max: getMax(match.scoreB, match.scoreA),
          value: match.scoreB || "",
          onChange: function(e) { onScore("B", Math.max(0, parseInt(e.target.value) || 0)); },
          disabled: match.submitted, style: iStyle(decided && match.scoreB > match.scoreA),
        }),
      ),
    ),
    v.error ? h("div", { style: {
      textAlign: "center", fontSize: 11, marginTop: 8, fontWeight: 600, padding: "4px 8px",
      borderRadius: 6, color: v.valid ? C.gold : C.red,
      background: v.valid ? C.gold + "15" : C.red + "15",
    }}, v.error) : null,
    match.submitted ? h("div", { style: { textAlign: "center", fontSize: 11, color: C.green, marginTop: 8, fontWeight: 600 } }, "\u2713 Ergebnis gespeichert") : null,
  );
}

// ── Ranking ──
function RankingPanel(props) {
  var names = props.names, rounds = props.rounds, wide = props.wide, compact = props.compact;
  var pts = getRanking(names, rounds);
  var mc = [C.gold, C.silver, C.bronze];
  return h("div", { style: { padding: compact ? 0 : "0 16px" } },
    h("div", { style: { fontSize: wide ? 16 : 14, fontWeight: 700, color: C.text, marginBottom: 10 } }, "\uD83C\uDFC6 Live-Rangliste"),
    pts.map(function(p, r) {
      return h("div", { key: p.index, style: {
        display: "flex", alignItems: "center", gap: wide ? 12 : 10,
        padding: wide ? "10px 14px" : "8px 12px", marginBottom: 4,
        background: r < 3 ? mc[r] + "15" : C.cardLight,
        borderRadius: 8, borderLeft: r < 3 ? "3px solid " + mc[r] : "3px solid transparent",
      }},
        h("div", { style: {
          width: wide ? 28 : 24, height: wide ? 28 : 24, borderRadius: "50%",
          background: r < 3 ? mc[r] : C.border,
          display: "flex", alignItems: "center", justifyContent: "center",
          fontSize: wide ? 13 : 12, fontWeight: 800, color: r < 3 ? C.bg : C.textDim, flexShrink: 0,
        }}, r + 1),
        h("div", { style: { flex: 1, fontSize: wide ? 15 : 14, fontWeight: 600, color: C.text } }, p.name),
        h("div", { style: { textAlign: "right" } },
          h("span", { style: { fontSize: wide ? 15 : 14, fontWeight: 800, color: C.accent } }, p.w + "W"),
          h("span", { style: { fontSize: wide ? 13 : 12, color: C.textDim, marginLeft: 6 } }, p.tp + " Pkt"),
        ),
      );
    }),
  );
}

// ── Timeline ──
function TimelineBar(props) {
  var activeRound = props.activeRound, wide = props.wide;
  return h("div", { style: {
    display: "flex", gap: 3, padding: wide ? "14px 24px" : "12px 16px",
    background: C.card, borderBottom: "1px solid " + C.border,
  }},
    SCHEDULE.map(function(item, i) {
      var isActive = item.type === "round" && item.round === activeRound;
      var isDone = item.type === "round" && item.round < activeRound;
      return h("div", { key: i, style: {
        flex: (item.type === "round" || item.type === "finale") ? 2 : 1,
        height: wide ? 8 : 6, borderRadius: 4, minWidth: 12,
        background: isActive ? C.accent : isDone ? C.green : item.type === "break" ? C.border : C.accent + "30",
      }});
    }),
  );
}

// ── Schedule ──
function ScheduleTab(props) {
  var activeRound = props.activeRound, phase = props.phase, wide = props.wide;
  return h("div", { style: { padding: wide ? "0" : "0 16px" } },
    SCHEDULE.map(function(item, i) {
      var isNow = item.type === "round" && item.round === activeRound && phase === "tournament";
      return h("div", { key: i, style: {
        display: "flex", gap: 12, padding: wide ? "12px 0" : "10px 0",
        borderBottom: "1px solid " + C.border,
        opacity: (item.type === "round" && item.round < activeRound) ? 0.4 : 1,
      }},
        h("div", { style: { width: wide ? 100 : 80, fontSize: wide ? 13 : 12, color: isNow ? C.accent : C.textDim, fontWeight: 600, flexShrink: 0, paddingTop: 2 } }, item.time),
        h("div", { style: { display: "flex", alignItems: "center", gap: 8 } },
          h("div", { style: {
            width: 8, height: 8, borderRadius: "50%", flexShrink: 0,
            background: isNow ? C.accent : (item.type === "round" && item.round < activeRound) ? C.green : item.type === "break" ? C.border : C.accent + "40",
          }}),
          h("div", { style: { fontSize: wide ? 15 : 14, color: isNow ? C.white : C.text, fontWeight: isNow ? 700 : 500 } },
            item.label,
            isNow ? h("span", { style: { fontSize: 11, color: C.accent, marginLeft: 6 } }, "\u2190 JETZT") : null,
          ),
        ),
      );
    }),
  );
}

// ── Main App ──
function App() {
  var phaseS = useState("setup"), phase = phaseS[0], setPhase = phaseS[1];
  var namesS = useState(DEFAULT_NAMES.slice()), names = namesS[0], setNames = namesS[1];
  var roundsS = useState([]), rounds = roundsS[0], setRounds = roundsS[1];
  var arS = useState(0), activeRound = arS[0], setActiveRound = arS[1];
  var tabS = useState("matches"), tab = tabS[0], setTab = tabS[1];
  var wide = useIsWide();

  function goToLottery() {
    var filled = names.map(function(n, i) { return n.trim() || "Spieler " + (i + 1); });
    setNames(filled);
    setPhase("lottery");
  }

  function startTournament(assignments) {
    var sorted = assignments.slice().sort(function(a, b) { return a.number - b.number; });
    var ordered = sorted.map(function(a) { return a.name; });
    setNames(ordered);
    setRounds(generatePairings(ordered));
    setPhase("tournament");
  }

  function updateScore(ri, mi, team, val) {
    setRounds(function(prev) {
      return prev.map(function(r, idx) {
        if (idx !== ri) return r;
        return r.map(function(m, midx) {
          if (midx !== mi) return m;
          var obj = {}; for (var k in m) obj[k] = m[k];
          obj[team === "A" ? "scoreA" : "scoreB"] = val;
          return obj;
        });
      });
    });
  }

  function submitRound(ri) {
    setRounds(function(prev) {
      return prev.map(function(r, idx) {
        if (idx !== ri) return r;
        return r.map(function(m) { var o = {}; for (var k in m) o[k] = m[k]; o.submitted = true; return o; });
      });
    });
    if (ri < ROUNDS - 1) { setActiveRound(ri + 1); setTab("matches"); }
    else { setPhase("done"); setTab("ranking"); }
  }

  var cur = rounds[activeRound] || [];
  var allOk = cur.every(function(m) { return isDecided(m.scoreA, m.scoreB) && validateScore(m.scoreA, m.scoreB).valid; });

  if (phase === "setup") return h(PlayerSetup, { names: names, setNames: setNames, onNext: goToLottery });
  if (phase === "lottery") return h(LotteryScreen, { names: names, onComplete: startTournament });

  function tabBtn(key, label) {
    return h("button", {
      onClick: function() { setTab(key); },
      style: {
        flex: 1, padding: wide ? "10px 0" : "8px 0",
        background: tab === key ? C.accentDim : "transparent",
        border: "1px solid " + (tab === key ? C.accent : C.border),
        borderRadius: 8, color: tab === key ? C.accent : C.textDim,
        fontSize: wide ? 14 : 13, fontWeight: 600, cursor: "pointer",
        fontFamily: "'DM Sans', sans-serif",
      },
    }, label);
  }

  var confirmBtn = !cur[0] || cur[0].submitted ? null : h("button", {
    onClick: function() { submitRound(activeRound); }, disabled: !allOk,
    style: {
      width: "100%", marginTop: 12, padding: wide ? 14 : 13,
      background: allOk ? "linear-gradient(135deg, " + C.green + ", #10b981)" : C.border,
      border: "none", borderRadius: 10,
      color: allOk ? C.bg : C.textDim,
      fontSize: wide ? 15 : 14, fontWeight: 700, cursor: allOk ? "pointer" : "default",
      fontFamily: "'DM Sans', sans-serif",
    },
  }, activeRound < ROUNDS - 1 ? "ERGEBNISSE BEST\u00c4TIGEN \u2192 N\u00c4CHSTE RUNDE" : "LETZTE RUNDE BEST\u00c4TIGEN");

  var prevRounds = activeRound > 0 ? h("div", { style: { marginTop: 12 } },
    h("div", { style: { fontSize: 12, color: C.textDim, marginBottom: 6, fontWeight: 600 } }, "Vorherige Runden:"),
    h("div", { style: { display: "flex", gap: 6, flexWrap: "wrap" } },
      rounds.slice(0, activeRound).map(function(_, ri) {
        return h("button", {
          key: ri, onClick: function() { setActiveRound(ri); },
          style: {
            padding: "6px 14px", background: C.cardLight,
            border: "1px solid " + C.border, borderRadius: 6,
            color: C.green, fontSize: 12, fontWeight: 600, cursor: "pointer",
            fontFamily: "'DM Sans', sans-serif",
          },
        }, "Runde " + (ri + 1) + " \u2713");
      }),
    ),
  ) : null;

  var doneMsg = phase === "done" && tab === "matches" ? h("div", { style: { padding: "20px 0", textAlign: "center" } },
    h("div", { style: { fontSize: 48, marginBottom: 12 } }, "\uD83C\uDFC6"),
    h("div", { style: { fontSize: wide ? 18 : 16, color: C.textDim } }, "Alle Runden gespielt! Schau in die Rangliste."),
  ) : null;

  // ── iPad Split View ──
  if (wide) {
    return h("div", { style: { maxWidth: 1100, margin: "0 auto", paddingBottom: 40 } },
      h(TimelineBar, { activeRound: activeRound, wide: true }),
      h("div", { style: { padding: "16px 24px 8px", display: "flex", justifyContent: "space-between", alignItems: "baseline" } },
        h("div", null,
          h("span", { style: { fontSize: 22, fontWeight: 800, color: C.white } },
            phase === "done" ? "Turnier beendet!" : "Runde " + (activeRound + 1)),
          h("span", { style: { fontSize: 13, color: C.textDim, marginLeft: 8 } },
            phase === "done" ? "\uD83C\uDFC6" : "von " + ROUNDS),
        ),
      ),
      // Tabs
      h("div", { style: { display: "flex", gap: 4, padding: "8px 24px 16px", maxWidth: 300 } },
        tabBtn("matches", "Spiele"), tabBtn("schedule", "Zeitplan"),
      ),
      // Split layout
      h("div", { style: { display: "flex", gap: 24, padding: "0 24px", alignItems: "flex-start" } },
        // Left
        h("div", { style: { flex: 3, minWidth: 0 } },
          tab === "matches" && phase !== "done" ? h("div", null,
            h("div", { style: { display: "flex", flexDirection: "column", gap: 12 } },
              cur.map(function(m, mi) {
                return h("div", { key: activeRound + "-" + mi },
                  h(ScoreInput, { match: m, names: names, wide: true,
                    onScore: function(team, val) { updateScore(activeRound, mi, team, val); },
                  }),
                );
              }),
            ),
            confirmBtn, prevRounds,
          ) : null,
          tab === "matches" && phase === "done" ? doneMsg : null,
          tab === "schedule" ? h(ScheduleTab, { activeRound: activeRound, phase: phase, wide: true }) : null,
        ),
        // Right: ranking always visible
        h("div", { style: {
          flex: 2, background: C.card, borderRadius: 12,
          padding: 16, border: "1px solid " + C.border,
          position: "sticky", top: 16, minWidth: 0,
        }},
          h(RankingPanel, { names: names, rounds: rounds, wide: true, compact: true }),
        ),
      ),
    );
  }

  // ── Mobile Layout ──
  return h("div", { style: { maxWidth: 500, margin: "0 auto", paddingBottom: 80 } },
    h(TimelineBar, { activeRound: activeRound, wide: false }),
    h("div", { style: { padding: "14px 16px 6px" } },
      h("span", { style: { fontSize: 18, fontWeight: 800, color: C.white } },
        phase === "done" ? "Turnier beendet!" : "Runde " + (activeRound + 1)),
      h("span", { style: { fontSize: 12, color: C.textDim, marginLeft: 8 } },
        phase === "done" ? "\uD83C\uDFC6" : "von " + ROUNDS),
    ),
    h("div", { style: { display: "flex", gap: 4, padding: "6px 16px 12px" } },
      tabBtn("matches", "Spiele"), tabBtn("ranking", "Rangliste"), tabBtn("schedule", "Zeitplan"),
    ),
    tab === "matches" ? h("div", { style: { padding: "0 16px" } },
      phase !== "done" ? [
        cur.map(function(m, mi) {
          return h(ScoreInput, { key: activeRound + "-" + mi, match: m, names: names, wide: false,
            onScore: function(team, val) { updateScore(activeRound, mi, team, val); },
          });
        }),
        confirmBtn, prevRounds,
      ] : doneMsg,
    ) : null,
    tab === "ranking" ? h(RankingPanel, { names: names, rounds: rounds, wide: false, compact: false }) : null,
    tab === "schedule" ? h(ScheduleTab, { activeRound: activeRound, phase: phase, wide: false }) : null,
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
